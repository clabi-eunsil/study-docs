site_name: MLOps Study Docs
site_url: https://clabi-eunsil.github.io/study-docs/
repo_url: https://github.com/clabi-eunsil/study-docs
docs_dir: docs
copyright: 개인 학습 목적으로 정리한 자료입니다. 출처를 밝히지 않은 무단 재배포를 금합니다.

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/glossary-filter.js

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.magiclink

plugins:
  - search
  - awesome-pages
  - glightbox
